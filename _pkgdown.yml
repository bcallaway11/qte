url: https://bcallaway11.github.io/qte

template:
  bootstrap: 5
  bootswatch: sandstone

authors:
  Brantly Callaway:
    href: https://bcallaway11.github.io/

navbar:
  title: "qte"
  left:
    - text: "Vignettes"
      href: articles/index.html
    - text: "Functions"
      href: reference/index.html
    - text: "News"
      href: news/index.html

home:
  links:
    - text: Source Code
      href: https://github.com/bcallaway11/qte
    - text: Report Bugs or Feature Requests
      href: https://github.com/bcallaway11/qte/issues

articles:
  - title: "Getting Started"
    contents:
      - intro
  - title: "DiD-Based Methods"
    contents:
      - panel-estimators
      - staggered-adoption

reference:
  - title: "Cross-sectional estimators"
    desc: >
      Estimators for the QTE and QTT under unconfoundedness (no panel data
      required).
    contents:
      - unc_qte

  - title: "Panel and repeated cross-section estimators"
    desc: >
      Estimators for the QTT using panel or repeated cross-section data.
      All support staggered treatment adoption via ptetools.
    contents:
      - cic
      - cic_gt
      - qdid
      - qdid_gt
      - mdid
      - mdid_gt
      - ddid
      - ddid_gt
      - panel_qtt
      - panel_qtt_gt
      - lou_qtt

  - title: "Package overview"
    contents:
      - qte-package

  - title: "Output and plotting"
    desc: >
      The QTE S3 class returned by unc_qte(), and methods for printing,
      summarising, and plotting.
    contents:
      - QTE
      - summary.QTE
      - print.summary.QTE
      - plot.QTE
      - autoplot.QTE
      - ggqte

  - title: "Data"
    desc: >
      Datasets bundled with the package.
    contents:
      - lalonde
      - lalonde.exp
      - lalonde.exp.panel
      - lalonde.psid
      - lalonde.psid.panel
