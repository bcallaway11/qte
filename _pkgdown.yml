url: https://bcallaway11.github.io/qte

template:
  bootstrap: 5
  bootswatch: sandstone

authors:
  Brantly Callaway:
    href: https://bcallaway11.github.io/

navbar:
  title: "qte"
  left:
    - text: "Vignettes"
      href: articles/index.html
    - text: "Functions"
      href: reference/index.html
    - text: "News"
      href: news/index.html

home:
  links:
    - text: Source Code
      href: https://github.com/bcallaway11/qte
    - text: Report Bugs or Feature Requests
      href: https://github.com/bcallaway11/qte/issues

articles:
  - title: "Getting Started"
    contents:
      - intro
  - title: "DiD-Based Methods"
    contents:
      - did-estimators
      - staggered-adoption

reference:
  - title: "Cross-sectional estimators"
    desc: >
      Estimators for the QTE and QTT under unconfoundedness (no panel data
      required).
    contents:
      - unc_qte

  - title: "DiD-based estimators"
    desc: >
      Estimators for the QTT under difference-in-differences and related
      assumptions. All support staggered treatment adoption via ptetools.
    contents:
      - cic
      - cic_gt
      - qdid
      - qdid_gt
      - mdid
      - mdid_gt
      - ddid
      - ddid_gt
      - panel_qtt
      - panel_qtt_gt
      - lou_qte

  - title: "Deprecated wrappers"
    desc: >
      Legacy two-period wrappers retained with deprecation warnings. Will be
      removed in v2.1 (target 2026-08). See the linked modern replacement in
      each function's documentation.
    contents:
      - CiC
      - QDiD
      - MDiD
      - ddid2
      - panel.qtet
      - ci.qte
      - ci.qtet

  - title: "Package overview"
    contents:
      - qte-package

  - title: "QTE class and output"
    desc: >
      The QTE S3 class returned by legacy estimators and unc_qte(), and
      methods for printing, summarising, and plotting.
    contents:
      - QTE
      - summary.QTE
      - print.summary.QTE
      - plot.QTE
      - autoplot.QTE
      - ggqte

  - title: "Data"
    desc: >
      Datasets bundled with the package.
    contents:
      - lalonde
      - lalonde.exp
      - lalonde.exp.panel
      - lalonde.psid
      - lalonde.psid.panel

  - title: "Internal and legacy infrastructure"
    desc: >
      Exported for technical reasons but not intended for direct use. Subject
      to removal in v2.1 alongside the deprecated wrappers.
    contents:
      - QTEparams
      - panelize.data
      - compute.panel.qtet
