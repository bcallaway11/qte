name: Build Check

on:
  pull_request:
  workflow_dispatch:

jobs:
  build-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, any::devtools, any::knitr, any::rmarkdown
          needs: website

      - name: Build README
        run: quarto render README.qmd

      - name: Build vignettes
        run: Rscript -e "devtools::build_vignettes()"

      - name: Build pkgdown site
        run: Rscript -e "pkgdown::build_site(preview = FALSE)"
